name: Fetch festival map KML (recon)

# Одноразовая разведка: скачать KML фестивальной карты Google My Maps
# (локальная песочница не имеет доступа к google.com). Удалится после
# интеграции карты.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  kml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch KML
        run: python3 scripts/scrape_site.py map
      - name: Commit KML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debug_html/ || true
          git diff --cached --quiet || { git commit -m "Recon: festival map KML"; git push; }
