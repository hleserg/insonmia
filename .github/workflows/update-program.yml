name: Update programme from insomniafest.ru

# Автообновление программы: раз в 6 часов (и вручную) скачиваем
# https://insomniafest.ru/export/program/2026 на раннере GitHub (открытый
# egress, нет CORS), конвертируем в data/program.json и коммитим, только
# если данные реально изменились. Приложение подтянет свежий файл кнопкой
# «Проверить обновление» или при следующем онлайн-запуске.
on:
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: write

concurrency:
  group: programme-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build data/program.json from the site export
        run: python3 scripts/scrape_site.py build

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/program.json
          if git diff --cached --quiet; then
            echo "Programme unchanged — nothing to commit."
          else
            git commit -m "Автообновление программы с insomniafest.ru"
            # ретрай на случай гонки с параллельным пушем человека
            for i in 1 2 3; do
              if git push; then exit 0; fi
              echo "push rejected (attempt $i) — rebasing and retrying"
              git pull --rebase
            done
            git push
          fi
