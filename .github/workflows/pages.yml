# Публикация PWA на GitHub Pages ЧЕРЕЗ Actions (Settings → Pages → Source:
# «GitHub Actions»). Смысл именно в этом workflow: он на лету собирает config.js
# из секретов TG_BOT_TOKEN/TG_CHAT_ID и подставляет <script src="config.js"> в
# index.html — токен мусорного бота в репозиторий не попадает. Нет секретов →
# config.js не создаётся, строка не вставляется, пинг «установили» молча выключен.
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# один активный деплой; не отменяем уже идущий (иначе половинчатая публикация)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Собрать config.js из секретов (если заданы)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            # значения не эхоим (GitHub их маскирует, но файл всё равно публичный —
            # это осознанно: мусорный бот, при абьюзе просто пересоздаётся)
            printf 'window.APP_CONFIG = { tg: { token: "%s", chat: "%s" } };\n' \
              "$TG_BOT_TOKEN" "$TG_CHAT_ID" > config.js
            # config.js подключаем ASYNC, НЕ defer. config.js НЕ прекэшируется SW
            # (свежий токен, см. #61) → офлайн его сетевой запрос МОЖЕТ ЗАВИСНУТЬ
            # (wifi без интернета в поле). defer исполняет скрипты ПО ПОРЯДКУ, и
            # зависший config.js навсегда блокировал бы app.js → «вечная загрузка».
            # async ни от чего не зависит и app.js не держит; APP_CONFIG нужен лишь
            # к appinstalled (жест юзера, сильно позже) — порядок не важен.
            sed -i 's#<script src="app.js" defer></script>#<script src="config.js" async></script>\n  <script src="app.js" defer></script>#' index.html
            echo "config.js собран и подключён (пинг включён)"
          else
            echo "секреты TG_* не заданы — config.js не создаётся, пинг выключен"
          fi

      # ЯВНО переводим источник Pages на «GitHub Actions» (build_type=workflow).
      # configure-pages enablement:true лишь СОЗДАЁТ сайт, но НЕ конвертирует уже
      # существующий legacy-сайт («Deploy from a branch») → deploy-pages падает
      # «Deployment failed, try again later». PUT /pages с pages:write это чинит.
      # Шаг не валит job: печатаем HTTP-код (403 → нужна ручная настройка владельцем).
      - name: Force Pages build_type=workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -sS -o /tmp/pages_put.json -w '%{http_code}' -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}') || true
          echo "PUT /pages build_type=workflow -> HTTP $code"
          cat /tmp/pages_put.json 2>/dev/null || true
          echo
          # 2xx = переключили; 404 = сайта ещё нет → создаст configure-pages ниже;
          # 403 = токену нельзя → нужна ручная Settings → Pages → Source: GitHub Actions

      # enablement:true — на лету создаём Pages (build_type «workflow»), если его
      # ещё нет (permission pages:write). Существующий сайт уже переключён PUT выше.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
