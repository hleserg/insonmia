name: Fetch OSM tiles for offline map

# Одноразово (и при смене bbox): вежливо скачать тайлы фестивальной зоны
# и закоммитить в assets/tiles/. Песочница разработки не имеет доступа к OSM.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch tiles (politely)
        run: python3 scripts/fetch_tiles.py
      - name: Commit tiles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tiles/
          if git diff --cached --quiet; then
            echo "no tile changes"
          else
            git commit -m "Офлайн-тайлы OSM фестивальной зоны (z13-18)"
            for i in 1 2 3; do
              if git push; then exit 0; fi
              echo "push rejected (attempt $i) — rebasing and retrying"
              git pull --rebase
            done
            git push
          fi
