<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Иконка «глаз в терминале». Композиция под maskable: фон заливает ВЕСЬ
       холст (маски платформ сами скруглят), значимое — в центральных 80%,
       центр глаза поднят (~276 vs 304), правый нижний квадрант свободен
       под бейдж Chrome, блик зрачка — влево-вверх. -->
  <rect width="512" height="512" fill="#0d1117"/>
  <!-- тайтл-бар терминала на всю ширину -->
  <rect width="512" height="96" fill="#161b22"/>
  <circle cx="64"  cy="48" r="14" fill="#f85149"/>
  <circle cx="104" cy="48" r="14" fill="#d29922"/>
  <circle cx="144" cy="48" r="14" fill="#3fb950"/>
  <!-- глаз: миндалевидный контур века двумя дугами -->
  <g stroke="#3fb950" stroke-width="16" fill="none" stroke-linecap="round">
    <path d="M96,276 Q256,148 416,276"/>
    <path d="M96,276 Q256,404 416,276"/>
    <circle cx="256" cy="276" r="62"/>
  </g>
  <!-- зрачок с бликом влево-вверх -->
  <circle cx="256" cy="276" r="24" fill="#3fb950"/>
  <circle cx="245" cy="265" r="9" fill="#0d1117"/>
</svg>
